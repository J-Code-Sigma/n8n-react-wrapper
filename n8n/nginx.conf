
events {
    worker_connections 1024;
}

http {
    # Map for WebSocket connections
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream n8n {
        server n8n:5678;
        keepalive 32;
    }

    server {
        listen 8081;
        server_name localhost;

        # Increase client max body size for file uploads
        client_max_body_size 50M;

        # Special handling for SSE push endpoint
        location /rest/push {
            proxy_pass http://n8n;
            
            # SSE specific headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE requires these specific settings
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 24h;
            proxy_connect_timeout 5s;
            proxy_send_timeout 24h;
            
            # Enable chunked transfer encoding for SSE
            chunked_transfer_encoding on;
            
            # Add CORS headers for SSE
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Cache-Control no-cache;
        }

        # Main location block for all other requests
        location / {
            proxy_pass http://n8n;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            
            # WebSocket support for other endpoints
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_cache_bypass $http_upgrade;
            
            # Remove conflicting headers
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            
            # Permissive CSP
            add_header Content-Security-Policy "frame-ancestors *; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob: *.cloudflare.com *.cloudflareinsights.com; object-src 'none'; connect-src 'self' ws: wss: https: data: *.cloudflare.com *.cloudflareinsights.com; img-src 'self' data: https: blob:;" always;
            
            # Enhanced timeout settings
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            
            # Additional headers
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Original-URI $request_uri;
            
            proxy_redirect off;
        }
    }
}
