
events {
    worker_connections 1024;
}

http {
    # Map for WebSocket connections
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream n8n {
        server n8n:5678;
    }

    server {
        listen 8081;
        server_name localhost;

        # Increase client max body size for file uploads
        client_max_body_size 50M;

        location / {
            proxy_pass http://n8n;
            proxy_http_version 1.1;
            
            # WebSocket headers - critical for WebSocket connections
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            
            # Remove conflicting headers that might interfere with iframe/WebSocket
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            
            # Add permissive CSP for iframe embedding and n8n functionality
            add_header Content-Security-Policy "frame-ancestors *; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; object-src 'none'; connect-src 'self' ws: wss: https: data:;" always;
            
            # WebSocket and timeout settings - increased for stability
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Disable buffering for real-time WebSocket communication
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            
            # Additional headers for WebSocket stability
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Original-URI $request_uri;
        }
        
        # Fallback location for static assets
        location @fallback {
            proxy_pass http://n8n;
        }
    }
}
