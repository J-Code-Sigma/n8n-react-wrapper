
events {
    worker_connections 1024;
}

http {
    # Map for WebSocket connections
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream n8n {
        server n8n:5678;
    }

    server {
        listen 8081;
        server_name localhost;

        # Increase client max body size for file uploads
        client_max_body_size 50M;

        location / {
            proxy_pass http://n8n;
            proxy_http_version 1.1;
            
            # Essential WebSocket headers (from forum suggestion)
            proxy_set_header Connection 'Upgrade';
            proxy_set_header Upgrade $http_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Remove X-Frame-Options to allow iframe embedding
            proxy_hide_header X-Frame-Options;
            
            # Add headers to allow iframe embedding
            add_header X-Frame-Options SAMEORIGIN always;
            add_header Content-Security-Policy "frame-ancestors 'self' *;" always;
            
            # Timeout settings for WebSockets
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            
            # Disable buffering for real-time communication
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            
            # Additional headers for WebSocket stability
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
        }
        
        # Fallback location for static assets (from forum suggestion)
        location @fallback {
            proxy_pass http://n8n;
        }
    }
}
