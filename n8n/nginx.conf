
events {
    worker_connections 1024;
}

http {
    # Map for WebSocket connections (fixed mapping)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream n8n {
        server n8n:5678;
    }

    server {
        listen 8081;
        server_name localhost;

        # Increase client max body size for file uploads
        client_max_body_size 50M;

        location / {
            proxy_pass http://n8n;
            proxy_http_version 1.1;
            
            # WebSocket headers - using the mapped connection upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            
            # Remove conflicting headers and fix CSP
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors 'self' *; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; object-src 'none';" always;
            
            # WebSocket and timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            
            # Disable buffering for real-time communication
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
        }
        
        # Fallback location for static assets
        location @fallback {
            proxy_pass http://n8n;
        }
    }
}
