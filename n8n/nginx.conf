
events {
    worker_connections 1024;
}

http {
    upstream n8n {
        server n8n:5678 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 8081;
        server_name localhost;

        # Add error page handling
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 "n8n service is not available. Please check if the n8n container is running.";
            add_header Content-Type text/plain;
        }

        location / {
            # Health check for n8n
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            
            proxy_pass http://n8n;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Remove X-Frame-Options to allow iframe embedding
            proxy_hide_header X-Frame-Options;
            
            # Add headers to allow iframe embedding
            add_header X-Frame-Options ALLOWALL always;
            add_header Content-Security-Policy "frame-ancestors *;" always;
            
            # WebSocket support for n8n
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Additional WebSocket settings
            proxy_buffering off;
            proxy_cache off;
            
            # Keep alive connections
            proxy_set_header Connection "keep-alive";
        }
    }
    
    # Map for WebSocket connections
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
}
